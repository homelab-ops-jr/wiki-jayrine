server {
    # nginx-unprivileged écoute sur 8080 (pas de capabilities root nécessaires)
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Logs sur stdout/stderr (capté par docker logs)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Headers de sécurité
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP minimaliste compatible avec MkDocs Material
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'" always;

    # MkDocs avec use_directory_urls (défaut) génère /chemin/page/index.html
    # try_files gère à la fois les fichiers directs et les sous-dossiers
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Assets statiques : cache long
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML : pas de cache (pour que les modifs apparaissent au prochain pull)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Réponses légères pour les erreurs courantes
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Pas de robots si tu veux garder le wiki à l'écart des moteurs
    # location = /robots.txt {
    #     return 200 "User-agent: *\nDisallow: /\n";
    # }
}
